name: Backend Deploy (EC2)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew clean build -x test

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/libs/*.jar"
          target: "/home/ubuntu/app"
          strip_components: 2

      - name: Run Application on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            fuser -k 8080/tcp || true
            rm -f /home/ubuntu/app/*-plain.jar

            export DB_URL='${{ secrets.DB_URL }}'
            export DB_USERNAME='${{ secrets.DB_USERNAME }}'
            export DB_PASSWORD='${{ secrets.DB_PASSWORD }}'
            export JWT_SECRET='${{ secrets.JWT_SECRET }}'
            export KAKAO_REDIRECT_URI='${{ secrets.KAKAO_REDIRECT_URI }}'
            export KAKAO_CLIENT_SECRET='${{ secrets.KAKAO_CLIENT_SECRET }}'
            export SERVER_PORT='8080'
            export SECURE_COOKIE='false'
            export COOKIE_SAME_SITE='Lax'

            : "${DB_URL:?DB_URL is required}"
            : "${DB_PASSWORD:?DB_PASSWORD is required}"
            : "${JWT_SECRET:?JWT_SECRET is required}"
            : "${KAKAO_REDIRECT_URI:?KAKAO_REDIRECT_URI is required}"
            : "${KAKAO_CLIENT_SECRET:?KAKAO_CLIENT_SECRET is required}"

            nohup java -jar /home/ubuntu/app/*.jar > /home/ubuntu/app/app.log 2>&1 &
