server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: NextPlan
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nextplan}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

app:
  frontend-origin: http://localhost:5173
  secure-cookie: ${SECURE_COOKIE:false}
  cookie:
    same-site: ${COOKIE_SAME_SITE:Lax}
  cors:
    allowed-origins:
      - http://localhost:5173
      - https://d5fqpgjqcaolx.cloudfront.net
  crawl:
    schedule-enabled: ${CRAWL_SCHEDULE_ENABLED:false}

kakao:
  client-id: ${KAKAO_CLIENT_ID:db721b1fa1169be8ebf9be1ebeedbcea}
  client-secret: ${KAKAO_CLIENT_SECRET:}
  redirect-uri: ${KAKAO_REDIRECT_URI:https://d5fqpgjqcaolx.cloudfront.net/auth/kakao/callback}
  token-uri: https://kauth.kakao.com/oauth/token
  user-info-uri: https://kapi.kakao.com/v2/user/me
  logout-uri: https://kapi.kakao.com/v1/user/logout
  unlink-uri: https://kapi.kakao.com/v1/user/unlink

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-ms: 1800000
  refresh-token-expiration-ms: 1209600000
